<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GastoControl — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul: #1A5276;
      --azul-med: #2E86C1;
      --azul-clar: #EBF5FB;
      --text: #1a1a2e;
      --text-sec: #6b7280;
      --borde: #e5e7eb;
      --bg: #f8fafc;
      --blanco: #ffffff;
      --error: #dc2626;
      --radio: 12px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--azul);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 24px;
      color: #fff;
    }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .logo-area p {
      font-size: 14px;
      color: var(--text-sec);
      margin-top: 4px;
    }
    .card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 16px;
      padding: 2rem;
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--borde);
      border-radius: var(--radio);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--blanco);
      transition: border-color .2s;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--azul-med);
      box-shadow: 0 0 0 3px rgba(46,134,193,0.1);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: var(--radio);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background .2s, transform .1s;
    }
    .btn-login:hover { background: #154360; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
    }
    .demo-hint {
      margin-top: 1.25rem;
      padding: 12px 14px;
      background: var(--azul-clar);
      border-radius: 10px;
      font-size: 12px;
      color: var(--azul);
      line-height: 1.6;
    }
    .demo-hint strong { font-weight: 600; }
    .loading { display: none; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-icon">💰</div>
      <h1>GastoControl</h1>
      <p>Control de gastos empresarial</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="usuario@empresa.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="field">
        <label>Sede</label>
        <select id="loginSede">
          <option value="">Cargando sedes...</option>
        </select>
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        <span class="loading"><span class="spinner"></span></span>
        Ingresar
      </button>
      <div class="error-msg" id="loginErr"></div>
      <div class="demo-hint">
        <strong>Demo admin:</strong> admin@demo.com / admin123<br>
        <strong>Demo usuario:</strong> user@demo.com / user123
      </div>
    </div>
  </div>

  <script type="module">
    import { sb, login } from './js/supabase.js';

    async function cargarSedes() {
      const { data } = await sb.from('sedes').select('*').eq('activa', true).order('nombre');
      const sel = document.getElementById('loginSede');
      sel.innerHTML = '<option value="">Seleccionar sede...</option>';
      (data || []).forEach(s => {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = s.nombre;
        sel.appendChild(o);
      });
    }
    cargarSedes();

    window.doLogin = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const sedeId = document.getElementById('loginSede').value;
      const errEl = document.getElementById('loginErr');
      const btn = document.getElementById('btnLogin');

      errEl.style.display = 'none';
      if (!email || !pass || !sedeId) {
        errEl.textContent = 'Completa todos los campos';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.querySelector('.loading').style.display = 'inline';

      const resultado = await login(email, pass, sedeId);
      if (resultado.ok) {
        window.location.href = 'app.html';
      } else {
        errEl.textContent = resultado.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.querySelector('.loading').style.display = 'none';
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.doLogin();
    });
  </script>
</body>
</html>
